name: audiobookshelf

x-daemonless:
  title: "Audiobookshelf"
  icon: ":material-headphones:"
  category: "Media Servers"
  description: "Self-hosted audiobook and podcast server."
  upstream_url: "https://github.com/advplyr/audiobookshelf"
  web_url: "https://www.audiobookshelf.org/"
  user: "bsd"
  mlock: false
  appjail: true

  docs:
    env:
      PUID: "User ID for the application process"
      PGID: "Group ID for the application process"
      TZ: "Timezone for the container"
    volumes:
      /config: "Configuration and database"
      /metadata: "Metadata cache"
      /audiobooks: "Audiobook library path"
    ports:
      13378: "Web UI"

services:
  audiobookshelf:
    image: ghcr.io/daemonless/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC

    volumes:
      - /path/to/containers/audiobookshelf:/config
      - /path/to/containers/audiobookshelf/metadata:/metadata
      - /path/to/media/audiobooks:/audiobooks

    ports:
      - 13378:13378
